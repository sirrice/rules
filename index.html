<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rules Browser</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #eef1f5;
  --panel: #101827;
  --panel-muted: #6b7280;
  --card: #ffffff;
  --ink: #111827;
  --line: #d7dce5;
  --accent: #1d4ed8;
  --green: #15803d;
  --amber: #b45309;
  --pink: #be185d;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  height: 100vh;
  overflow: hidden;
}
.layout { display: flex; height: 100vh; }
.sidebar {
  width: 280px;
  background: var(--panel);
  color: white;
  display: flex;
  flex-direction: column;
}
.sidebar h1 {
  font-size: 15px;
  font-weight: 700;
  padding: 16px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-inner {
  overflow-y: auto;
  padding: 14px 16px 20px;
}
.section-label {
  font-size: 10px;
  letter-spacing: 1.3px;
  text-transform: uppercase;
  color: var(--panel-muted);
  margin: 14px 0 6px;
}
.search-input {
  width: 100%;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  color: white;
  border-radius: 8px;
  padding: 9px 10px;
  font-size: 13px;
}
.search-input::placeholder { color: #7b8595; }
.btn-list { display: flex; flex-direction: column; gap: 4px; }
.side-btn {
  width: 100%;
  text-align: left;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: #d4d9e2;
  padding: 8px 10px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
}
.side-btn:hover { background: rgba(255,255,255,0.06); }
.side-btn.active { background: rgba(59,130,246,0.2); color: white; }
.side-count { color: #8d99ad; font-size: 11px; }
.loaded-file {
  font-size: 12px;
  color: #b7c0cf;
  padding: 3px 0;
}
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.main-header {
  background: white;
  border-bottom: 1px solid var(--line);
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: center;
}
.main-scroll {
  overflow-y: auto;
  padding: 18px 20px 36px;
}
.header-title { font-size: 14px; color: #4b5563; }
.header-note {
  font-size: 11px;
  color: #6b7280;
  background: #f8fafc;
  border: 1px solid #e5e7eb;
  border-radius: 999px;
  padding: 4px 10px;
}
.rules-list {
  max-width: 980px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--line);
  padding: 16px 18px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.card { border-left: 4px solid var(--accent); }
.card-text {
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
  margin-bottom: 12px;
}
.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 10px;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 999px;
  background: #eef2ff;
  color: #3730a3;
  font-size: 11px;
}
.tag.type { background: #eff6ff; color: #1d4ed8; }
.tag.det { background: #ecfdf5; color: var(--green); }
.tag.mix { background: #fffbeb; color: var(--amber); }
.tag.llm { background: #fdf2f8; color: var(--pink); }
.tag.low { background: #fff7ed; color: #c2410c; }
.tag.marked { background: #fee2e2; color: #b91c1c; }
.reasoning {
  margin-top: 10px;
  font-size: 13px;
  color: #4b5563;
  line-height: 1.55;
}
.reasoning strong { color: #1f2937; }
.source-link {
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
}
.source-link:hover { text-decoration: underline; }
.splash {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #1f2937, #0f172a);
  color: white;
}
.splash-card {
  width: min(560px, calc(100vw - 32px));
  background: rgba(17,24,39,0.95);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}
.splash-card h1 {
  font-size: 22px;
  margin-bottom: 8px;
}
.splash-card p {
  color: #b4bfd1;
  line-height: 1.6;
  font-size: 14px;
}
.status-list {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.status-row {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 13px;
}
.status-row .dim { color: #9aa6b9; }
.empty, .error {
  max-width: 740px;
  margin: 40px auto 0;
  background: white;
  border-radius: 14px;
  border: 1px solid var(--line);
  padding: 22px;
  color: #4b5563;
}
.error { border-color: #fecaca; background: #fff7f7; color: #991b1b; }
@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; height: 42vh; }
}
</style>
</head>
<body>

<div id="splash" class="splash">
  <div class="splash-card">
    <h1>Rules Browser</h1>
    <p>Loading <code>processed_v2.db</code>. This is the V2 browser for your current taxonomy.</p>
    <div id="statusList" class="status-list"></div>
    <p id="splashError" style="display:none; margin-top:16px; color:#fca5a5;"></p>
  </div>
</div>

<div id="app" class="layout" style="display:none">
  <div class="sidebar">
    <h1>Rules Browser</h1>
    <div class="sidebar-inner">
      <div class="section-label">Dataset</div>
      <div id="tabList" class="btn-list"></div>

      <div class="section-label">Search</div>
      <input id="searchInput" class="search-input" placeholder="Search rule text">

      <div class="section-label">Primary Filter</div>
      <div id="categoryList" class="btn-list"></div>

      <div class="section-label" id="secondaryLabel">Secondary Filter</div>
      <div id="secondaryList" class="btn-list"></div>

      <div class="section-label">Source</div>
      <div id="sourceList" class="btn-list"></div>

      <div class="section-label">Loaded Files</div>
      <div id="loadedFiles"></div>
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <div id="totalInfo" class="header-title">Loading…</div>
      <div class="header-note">V2 browser</div>
    </div>
    <div class="main-scroll">
      <div id="rulesList" class="rules-list"></div>
    </div>
  </div>
</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/+esm';

const DB_FILE = {
  file: 'processed_v2.db',
  desc: 'New taxonomy with rule_type, confidence, labels, and reasoning'
};

const S = {
  db: null,
  conn: null,
  loaded: false,
  total: 0,
  search: '',
  category: 'all',
  secondary: '',
  source: ''
};

function esc(text) {
  return text == null ? '' : String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function sqlStr(value) {
  return value == null ? 'NULL' : `'${String(value).replace(/'/g, "''")}'`;
}

async function initDuckDB() {
  const bundles = duckdb.getJsDelivrBundles();
  const bundle = await duckdb.selectBundle(bundles);
  const workerUrl = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}")`], { type: 'text/javascript' })
  );
  const worker = new Worker(workerUrl);
  const db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(duckdb.LogLevel.WARNING), worker);
  await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
  return db;
}

async function rows(sql) {
  const result = await S.conn.query(sql);
  const fields = result.schema.fields.map(field => field.name);
  const out = [];
  for (const batch of result.batches) {
    for (let i = 0; i < batch.numRows; i++) {
      const row = {};
      fields.forEach((name, index) => {
        let value = batch.getChildAt(index).get(i);
        if (typeof value === 'bigint') value = Number(value);
        row[name] = value;
      });
      out.push(row);
    }
  }
  return out;
}

async function scalar(sql) {
  const result = await rows(sql);
  return result[0] ? Object.values(result[0])[0] : 0;
}

async function ensureSchema() {
  await S.conn.query(`
    CREATE TABLE IF NOT EXISTS all_rules (
      id VARCHAR PRIMARY KEY,
      source_db VARCHAR,
      source_id VARCHAR,
      source_url VARCHAR,
      repo_name VARCHAR,
      rule_source VARCHAR,
      rule_text TEXT NOT NULL,
      rule_index INTEGER,
      rule_type VARCHAR,
      enforcement_mode VARCHAR,
      mechanism VARCHAR,
      labels_json TEXT,
      confidence DOUBLE,
      reasoning TEXT,
      manual_reprocess BOOLEAN,
      updated_at TIMESTAMP
    )
  `);
}

function renderStatuses(statuses) {
  const status = statuses.v2 || 'waiting';
  const label = status === 'loaded'
    ? 'Loaded'
    : status === 'missing'
      ? 'Missing'
      : status === 'error'
        ? 'Error'
        : 'Loading…';
  document.getElementById('statusList').innerHTML = `
    <div class="status-row">
      <div>
        <div>${esc(DB_FILE.file)}</div>
        <div class="dim">${esc(DB_FILE.desc)}</div>
      </div>
      <div>${label}</div>
    </div>
  `;
}

async function importV2(attachedSchema) {
  await S.conn.query(`
    INSERT INTO all_rules
    SELECT
      id,
      source_db,
      source_id,
      source_url,
      repo_name,
      rule_source,
      rule_text,
      rule_index,
      rule_type,
      enforcement_mode,
      mechanism,
      labels_json,
      confidence,
      reasoning,
      COALESCE(manual_reprocess, FALSE),
      updated_at
    FROM ${attachedSchema}.processed_rules_v2
  `);
}

async function loadDatabase(statuses) {
  try {
    const response = await fetch(DB_FILE.file);
    if (!response.ok) {
      statuses.v2 = 'missing';
      renderStatuses(statuses);
      return;
    }

    const buffer = new Uint8Array(await response.arrayBuffer());
    await S.db.registerFileBuffer(DB_FILE.file, buffer);
    const schema = 'src_v2';
    await S.conn.query(`ATTACH '${DB_FILE.file}' AS ${schema} (READ_ONLY)`);
    await importV2(schema);

    await S.conn.query(`DETACH ${schema}`);
    S.loaded = true;
    S.total = await scalar('SELECT COUNT(*) FROM all_rules');
    statuses.v2 = 'loaded';
  } catch (error) {
    console.error(`Failed loading ${DB_FILE.file}:`, error);
    statuses.v2 = 'error';
  }
  renderStatuses(statuses);
}

function buildWhere({ skipCategory = false, skipSecondary = false, skipSource = false } = {}) {
  const wheres = ['1 = 1'];

  if (S.search) {
    wheres.push(`LOWER(rule_text) LIKE ${sqlStr('%' + S.search.toLowerCase() + '%')}`);
  }
  if (!skipSource && S.source) {
    wheres.push(`rule_source = ${sqlStr(S.source)}`);
  }

  if (!skipCategory) {
    if (S.category === 'uncategorized') wheres.push('rule_type IS NULL');
    else if (S.category !== 'all') wheres.push(`rule_type = ${sqlStr(S.category)}`);
  }
  if (!skipSecondary && S.secondary) {
    wheres.push(`enforcement_mode = ${sqlStr(S.secondary)}`);
  }

  return 'WHERE ' + wheres.join(' AND ');
}

async function renderTabs() {
  document.getElementById('tabList').innerHTML = `
    <button class="side-btn active" type="button" disabled>
      <span>${esc(DB_FILE.file)}</span>
      <span class="side-count">${Number(S.total).toLocaleString()}</span>
    </button>
  `;
}

async function renderCategoryList() {
  const total = await scalar(`SELECT COUNT(*) FROM all_rules ${buildWhere({ skipCategory: true, skipSecondary: true, skipSource: true })}`);
  const unc = await scalar(`SELECT COUNT(*) FROM all_rules ${buildWhere({ skipCategory: true, skipSecondary: true, skipSource: true })} AND rule_type IS NULL`);
  const output = await scalar(`SELECT COUNT(*) FROM all_rules ${buildWhere({ skipCategory: true, skipSecondary: true, skipSource: true })} AND rule_type = 'output_rule'`);
  const process = await scalar(`SELECT COUNT(*) FROM all_rules ${buildWhere({ skipCategory: true, skipSecondary: true, skipSource: true })} AND rule_type = 'process_rule'`);
  const items = [
    ['all', 'All', total],
    ['uncategorized', 'Uncategorized', unc],
    ['output_rule', 'Output Rule', output],
    ['process_rule', 'Process Rule', process]
  ];

  document.getElementById('categoryList').innerHTML = items.map(([key, label, count]) => `
    <button class="side-btn ${S.category === key ? 'active' : ''}" data-category="${esc(key)}">
      <span>${esc(label)}</span>
      <span class="side-count">${Number(count).toLocaleString()}</span>
    </button>
  `).join('');

  document.querySelectorAll('[data-category]').forEach(button => {
    button.addEventListener('click', async () => {
      S.category = button.dataset.category;
      await renderRules();
      await renderCategoryList();
      await renderSecondaryList();
      await renderSourceList();
      await renderHeader();
    });
  });
}

async function renderSecondaryList() {
  const labelEl = document.getElementById('secondaryLabel');
  labelEl.textContent = 'Enforcement';
  const query = `
    SELECT COALESCE(enforcement_mode, '(none)') AS key, COUNT(*) AS n
    FROM all_rules ${buildWhere({ skipSecondary: true })}
    GROUP BY 1 ORDER BY 2 DESC
  `;
  const data = await rows(query);
  const buttons = [
    `<button class="side-btn ${S.secondary === '' ? 'active' : ''}" data-secondary="">
      <span>All</span><span class="side-count"></span>
    </button>`,
    ...data.map(row => `
      <button class="side-btn ${S.secondary === (row.key === '(none)' ? '' : row.key) ? 'active' : ''}" data-secondary="${esc(row.key === '(none)' ? '' : row.key)}">
        <span>${esc(row.key)}</span>
        <span class="side-count">${Number(row.n).toLocaleString()}</span>
      </button>
    `)
  ];
  document.getElementById('secondaryList').innerHTML = buttons.join('');

  document.querySelectorAll('[data-secondary]').forEach(button => {
    button.addEventListener('click', async () => {
      S.secondary = button.dataset.secondary;
      await renderRules();
      await renderSecondaryList();
      await renderSourceList();
      await renderHeader();
    });
  });
}

async function renderSourceList() {
  const data = await rows(`
    SELECT COALESCE(rule_source, '(none)') AS source_key, COUNT(*) AS n
    FROM all_rules ${buildWhere({ skipSource: true })}
    GROUP BY 1 ORDER BY 2 DESC
  `);
  const buttons = [
    `<button class="side-btn ${S.source === '' ? 'active' : ''}" data-source="">
      <span>All sources</span><span class="side-count"></span>
    </button>`,
    ...data.map(row => `
      <button class="side-btn ${S.source === (row.source_key === '(none)' ? '' : row.source_key) ? 'active' : ''}" data-source="${esc(row.source_key === '(none)' ? '' : row.source_key)}">
        <span>${esc(row.source_key)}</span>
        <span class="side-count">${Number(row.n).toLocaleString()}</span>
      </button>
    `)
  ];
  document.getElementById('sourceList').innerHTML = buttons.join('');

  document.querySelectorAll('[data-source]').forEach(button => {
    button.addEventListener('click', async () => {
      S.source = button.dataset.source;
      await renderRules();
      await renderHeader();
    });
  });
}

function enforcementTagClass(mode) {
  if (mode === 'deterministic') return 'det';
  if (mode === 'mixed') return 'mix';
  if (mode === 'llm') return 'llm';
  return '';
}

function parseLabels(raw) {
  if (!raw) return [];
  try {
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function makeCard(rule) {
  const labels = parseLabels(rule.labels_json);
  const confidence = rule.confidence == null ? null : Number(rule.confidence);
  const meta = [];

  meta.push('<span class="tag">V2</span>');
  if (rule.source_db) meta.push(`<span class="tag">${esc(rule.source_db)}</span>`);
  if (rule.rule_source) meta.push(`<span class="tag">${esc(rule.rule_source)}</span>`);
  if (rule.rule_type) meta.push(`<span class="tag type">${esc(rule.rule_type)}</span>`);
  if (rule.enforcement_mode) meta.push(`<span class="tag ${enforcementTagClass(rule.enforcement_mode)}">${esc(rule.enforcement_mode)}</span>`);
  if (rule.mechanism) meta.push(`<span class="tag">${esc(rule.mechanism)}</span>`);
  if (confidence != null) {
    const cls = confidence < 0.7 ? 'low' : '';
    meta.push(`<span class="tag ${cls}">confidence ${confidence.toFixed(2)}</span>`);
  }
  if (rule.manual_reprocess) meta.push(`<span class="tag marked">marked</span>`);
  if (rule.repo_name) meta.push(`<span class="tag">${esc(rule.repo_name)}</span>`);
  for (const label of labels) {
    meta.push(`<span class="tag">${esc(label)}</span>`);
  }
  if (rule.source_url) {
    meta.push(`<a class="source-link" href="${esc(rule.source_url)}" target="_blank">source ↗</a>`);
  }

  return `
    <div class="card">
      <div class="card-text">${esc(rule.rule_text)}</div>
      <div class="meta">${meta.join('')}</div>
      ${rule.reasoning ? `<div class="reasoning"><strong>Reasoning:</strong> ${esc(rule.reasoning)}</div>` : ''}
    </div>
  `;
}

async function renderHeader() {
  const total = await scalar(`SELECT COUNT(*) FROM all_rules ${buildWhere()}`);
  document.getElementById('totalInfo').textContent =
    `${Number(total).toLocaleString()} rules · ${DB_FILE.file}`;
}

async function renderRules() {
  const list = document.getElementById('rulesList');
  try {
    const data = await rows(`
      SELECT *
      FROM all_rules ${buildWhere()}
      ORDER BY source_db, rule_index ASC NULLS LAST, id
      LIMIT 500
    `);
    if (!data.length) {
      list.innerHTML = `<div class="empty">No rules matched the current filters.</div>`;
      return;
    }
    list.innerHTML = data.map(makeCard).join('');
  } catch (error) {
    console.error(error);
    list.innerHTML = `<div class="error">Query error: ${esc(error.message)}</div>`;
  }
}

function renderLoadedFiles() {
  document.getElementById('loadedFiles').innerHTML = S.loaded
    ? `<div class="loaded-file">${esc(DB_FILE.file)}</div>`
    : '';
}

async function refresh() {
  await renderTabs();
  await renderCategoryList();
  await renderSecondaryList();
  await renderSourceList();
  await renderHeader();
  await renderRules();
}

async function boot() {
  S.db = await initDuckDB();
  S.conn = await S.db.connect();
  await ensureSchema();

  const statuses = {};
  renderStatuses(statuses);

  statuses.v2 = 'loading';
  renderStatuses(statuses);
  await loadDatabase(statuses);

  if (!S.loaded) {
    const errorEl = document.getElementById('splashError');
    errorEl.style.display = '';
    errorEl.textContent = 'Could not find processed_v2.db in this directory.';
    return;
  }

  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  renderLoadedFiles();
  await refresh();

  document.getElementById('searchInput').addEventListener('input', async event => {
    S.search = event.target.value.trim();
    await renderHeader();
    await renderRules();
  });
}

boot().catch(error => {
  console.error(error);
  const splashError = document.getElementById('splashError');
  splashError.style.display = '';
  splashError.textContent = error.message;
});
</script>
</body>
</html>
